<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanban Board</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Kanban Board</h1>

<div class="board">

  <div class="column">
    <h2>To Do</h2>

    <div class="card-list">
      <div class="card" draggable="true">Butter Naan</div>
      <div class="card" draggable="true">Masala Dosa</div>
    </div>

    <button class="add-btn">+ Add Task</button>

  </div>

  <div class="column">
    <h2>In Progress</h2>

    <div class="card-list">
      <div class="card" draggable="true">Biryani</div>
    </div>

    <button class="add-btn">+ Add Task</button>

  </div>

  <div class="column">
    <h2>Done</h2>

    <div class="card-list">
      <div class="card" draggable="true">Sambar</div>
    </div>

    <button class="add-btn">+ Add Task</button>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
